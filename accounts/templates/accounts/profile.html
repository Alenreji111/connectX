<!doctype html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen flex justify-center items-center">

<div class="bg-white p-8 rounded-2xl shadow w-96">

<h2 class="text-2xl font-bold mb-6 text-center">
Your Profile
</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="flex flex-col items-center gap-3">

{% if request.user.profile.avatar %}
    <img src="{{ request.user.profile.avatar.url }}">
{% endif %}

<input type="file"
       name="avatar"
       class="text-sm">

</div>

<textarea name="bio"
          placeholder="Write something about you..."
          class="w-full mt-4 p-2 border rounded">{{profile.bio}}</textarea>

<button class="w-full mt-4 bg-green-600 text-white py-2 rounded-lg">
Save
</button>

</form>

</div>
</body>
</html>
