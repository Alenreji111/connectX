<div id="group-chat-data"
     data-room-id="{{ room.id }}"
     data-username="{{ request.user.username }}"
     data-user-id="{{ request.user.id }}"
     style="display:none;">
</div>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group</title>
  </head>
  <body>
    <!-- <h3>Group: {{ room.name }}</h3> -->
    <div class="flex flex-col h-full">
      <!-- HEADER -->
      <div class="bg-white shadow p-4 border-b">
        <h2 class="font-semibold text-lg">Group: {{ room.name }}</h2>
      </div>
      <!-- MESSAGES -->
      <div
        id="messages"
        class="flex-1 overflow-y-auto p-4 bg-gray-50 flex flex-col gap-2"
      >
        {% for msg in messages %}
        <div
          class="flex {% if msg.sender.id == request.user.id %}justify-end{% else %}justify-start{% endif %}"
        >
          <div id="msg-{{ msg.id }}"
            class="px-4 py-2 rounded-xl max-w-xs {% if msg.sender.id == request.user.id %} bg-green-300 {% else %} bg-white {% endif %}"
          >
            {{ msg.sender.username }}: {{ msg.content }}

            <div class="text-xs text-gray-600">
              {{ msg.timestamp|time:"H:i" }}

              {% if msg.sender.id == request.user.id %}
                 <button onclick="editMessage({{ msg.id }}, '{{ msg.content|escapejs }}')"
                       class="text-blue-500 hover:text-blue-700 text-xs font-semibold">
                       Edit
                 </button>
                 <button
                   onclick="deleteMessage({{ msg.id }})"
                   class="text-red-500 hover:text-red-700 text-xs font-semibold"
                 >
                   Delete
                 </button>
              {% endif %}
            </div>
          </div>
        </div>
        {% endfor %}
      </div>

      <!-- TYPING -->
      <!-- <div id="typing-indicator" class="text-sm text-gray-500 h-5 ml-4"></div> -->

      <!-- INPUT -->
      <div class="flex gap-2 p-3 bg-white border-t">
        <input
          id="messageInput"
          class="flex-1 border rounded-lg px-3 py-2 outline-none"
          placeholder="Type a message..."
        />

        <button
          onclick="sendGroupMessage()"
          class="bg-green-500 text-white px-4 py-2 rounded-lg"
        >
          Send
        </button>
      </div>
    </div>

    
  </body>
</html>
